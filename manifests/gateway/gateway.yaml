apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: platform-gateway
  namespace: platform
  labels:
    cilium.io/lb-pool: lb-pool-public
  annotations:
    io.cilium/lb-ipam-ips: "198.51.100.20"
spec:
  gatewayClassName: cilium
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: Same

